<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Cone angle lab</title><style>body{font-family:system-ui,Segoe UI,sans-serif;margin:0;padding:18px;color:#172026;background:#fff}.wrap{max-width:820px;margin:auto}svg{width:100%;height:360px;border:1px solid #d7dde2;background:#fbfcfd}input{width:100%}.readout{font-weight:650;margin:10px 0 14px}</style></head><body><div class="wrap"><h2>Cone curvature lab</h2><div class="readout" id="readout"></div><input id="angle" type="range" min="0.8" max="3.4" step="0.01" value="2.0" aria-label="total angle in multiples of pi"><svg id="svg" viewBox="-140 -125 280 250"></svg></div><script>const svg=document.getElementById('svg'),slider=document.getElementById('angle'),readout=document.getElementById('readout');function polar(r,t){return[r*Math.cos(t),r*Math.sin(t)]}function draw(){const m=parseFloat(slider.value),L=m*Math.PI,c=Math.min(L,2*Math.PI),n=120,cls=Math.abs(m-2)<0.01?'flat: both signs':(m<2?'curvature >= 0 near vertex':'curvature <= 0 near vertex');readout.textContent=`total angle L = ${m.toFixed(2)} pi; angle defect 2pi-L = ${(2-m).toFixed(2)} pi; ${cls}`;let d=`M 0 0 L 105 0 `;for(let i=0;i<=n;i++){const p=polar(105,c*i/n);d+=`L ${p[0].toFixed(2)} ${p[1].toFixed(2)} `}d+=`L 0 0`;svg.innerHTML=`<path d="${d}" fill="#dfeef3" stroke="#24566b" stroke-width="2"/><circle cx="0" cy="0" r="4" fill="#111"/><text x="-132" y="-105" font-size="11">Move the slider: short links make fat cones, long links make CAT(0) cones.</text>`;if(L>2*Math.PI){let d2='';for(let i=0;i<=60;i++){const p=polar(82,2*Math.PI+(L-2*Math.PI)*i/60);d2+=(i?'L':'M')+` ${p[0].toFixed(2)} ${p[1].toFixed(2)} `}svg.innerHTML+=`<path d="${d2}" fill="none" stroke="#9b3d3d" stroke-width="2" stroke-dasharray="5 4"/>`;}}slider.addEventListener('input',draw);draw();</script></body></html>
