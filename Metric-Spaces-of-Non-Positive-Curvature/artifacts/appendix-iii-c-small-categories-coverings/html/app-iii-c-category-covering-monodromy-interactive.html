<!doctype html><meta charset='utf-8'><title>III.C Appendix: Fundamental Groups and Coverings of Small Categories</title><style>body{font-family:system-ui,sans-serif;margin:0;background:#fbfcfd;color:#1f2d3d}main{max-width:950px;margin:auto;padding:24px}.stage{display:grid;grid-template-columns:280px 1fr;gap:20px}button{width:100%;text-align:left;margin:4px 0;padding:8px;border:1px solid #c6d4df;background:white;border-radius:6px}button.active{background:#fff4d6;border-color:#d95f02}.panel{border:1px solid #c6d4df;background:white;border-radius:8px;padding:18px}svg{width:100%;height:220px}</style><main><h1>III.C Appendix: Fundamental Groups and Coverings of Small Categories</h1><p>Make category paths, loops, and covering fibers visible enough to support the complexes-of-groups chapter.</p><div class='stage'><ol><li><button data-index='0'>small category</button></li><li><button data-index='1'>category path</button></li><li><button data-index='2'>fundamental group</button></li><li><button data-index='3'>covering category</button></li><li><button data-index='4'>fiber monodromy</button></li></ol><div class='panel'><svg viewBox='0 0 600 220'><line x1='55' y1='165' x2='535' y2='55' stroke='#9aa6b2' stroke-width='5'/><circle id='dot' cx='55' cy='165' r='18' fill='#d95f02'/><text id='label' x='80' y='160' font-size='22'></text></svg><p id='explain'></p><details><summary>Recorded invariant check</summary><code>{&#x27;tree_chord&#x27;: 2.2, &#x27;model_chord&#x27;: 2.220360331117452, &#x27;cat0_margin&#x27;: 0.020360331117451835}</code></details></div></div></main><script>const concepts=["small category", "category path", "fundamental group", "covering category", "fiber monodromy"];const bs=[...document.querySelectorAll('button')],dot=document.querySelector('#dot'),label=document.querySelector('#label'),explain=document.querySelector('#explain');function sel(i){bs.forEach((b,j)=>b.classList.toggle('active',i===j));let x=55+i*(480/Math.max(1,concepts.length-1)),y=165-i*(110/Math.max(1,concepts.length-1));dot.setAttribute('cx',x);dot.setAttribute('cy',y);label.setAttribute('x',Math.min(x+24,390));label.setAttribute('y',y+7);label.textContent=concepts[i];explain.textContent='Inspection target: connect '+concepts[i]+' to the saved invariant.'}bs.forEach((b,i)=>b.onclick=()=>sel(i));sel(0);</script>
